name: Update Sub
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright Chromium
        run: |
          [ ! -f package.json ] && npm init -y
          npm i playwright
          npx playwright install chromium --with-deps

      - name: Fetch dynamic sub link
        run: |
          mkdir -p htmls/free_clash
          cat > getlink.js << 'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            await page.goto('https://www.freeclash.top/ui/free_clash', { waitUntil:'networkidle', timeout:30000 });
            const html = await page.content();
            // 打印完整页面源码，看页面里到底有没有目标链接
            console.log(html);
            const match = html.match(/https:\/\/www\.freeclash\.top\/v1\/sub\/ssr\/[^\s"'<>]+/);
            console.log("匹配结果：", match ? match[0] : "无匹配");
            await browser.close();
          })();
          EOF
          SUB_RAW=$(node getlink.js)
          echo "$SUB_RAW" > page_source.txt
          SUB_URL=$(echo "$SUB_RAW" | grep -o "https://www.freeclash.top/v1/sub/ssr/[^\s]\+")
          echo "Get sub link: $SUB_URL"
          if [ -z "$SUB_URL" ]; then echo "Link empty, exit"; exit 1; fi
          curl -s --retry 3 "$SUB_URL" -o htmls/free_clash/config.yaml

      - name: Commit & push
        run: |
          git config user.name "SubBot"
          git config user.email "bot@github.com"
          git remote set-url origin https://${{ github.token }}@github.com/${{ github.repository }}.git
          git add htmls/free_clash/config.yaml
          git commit -m "Auto update clash config" || true
          git push
