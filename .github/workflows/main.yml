name: Update Sub
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright Chromium
        run: |
          [ ! -f package.json ] && npm init -y
          npm i playwright
          npx playwright install chromium --with-deps

      - name: Fetch & debug page source
        run: |
          mkdir -p htmls/free_clash
          cat > getlink.js << 'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            await page.goto('https://www.freeclash.top/ui/free_clash', { waitUntil:'networkidle', timeout:30000 });
            const html = await page.content();
            console.log("====PAGE HTML START====");
            console.log(html);
            console.log("====PAGE HTML END====");
            const match = html.match(/https:\/\/www\.freeclash\.top\/v1\/sub\/ssr\/[^\s"'<>]+/);
            console.log("匹配链接：", match ? match[0] : "无匹配链接");
            await browser.close();
          })();
          EOF
          # 直接打印输出，不再赋值判断退出，先看页面内容
          node getlink.js

      - name: Commit & push
        run: |
          git config user.name "SubBot"
          git config user.email "bot@github.com"
          git remote set-url origin https://${{ github.token }}@github.com/${{ github.repository }}.git
          git add .
          git commit -m "Debug run" || true
          git push
